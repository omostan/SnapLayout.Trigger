name: Publish NuGet Package

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore SnapLayout.sln

    - name: Build
      run: dotnet build SnapLayout.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test SnapLayout.sln --configuration Release --no-build --verbosity normal

    - name: Pack
      run: dotnet pack SnapLayout.Trigger/SnapLayout.Trigger.csproj --configuration Release --output ./artifacts --verbosity normal

    - name: List artifacts
      run: |
        Write-Host "Contents of artifacts directory:"
        Get-ChildItem ./artifacts -Recurse | ForEach-Object { Write-Host "  $($_.FullName)" }

    - name: Publish to NuGet
      run: |
        $nupkgFiles = Get-ChildItem ./artifacts/*.nupkg
        if ($nupkgFiles.Count -eq 0) {
          Write-Error "No .nupkg files found in ./artifacts directory"
          exit 1
        }
        Write-Host "Publishing $($nupkgFiles.Count) package(s) to NuGet:"
        foreach ($file in $nupkgFiles) {
          Write-Host "  Publishing: $($file.Name)"
          dotnet nuget push $file.FullName --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        }
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    - name: Upload artifacts to release
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/*.nupkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
