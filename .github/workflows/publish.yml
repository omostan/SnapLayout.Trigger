name: Publish NuGet Package

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore SnapLayout.sln

    - name: Build
      run: dotnet build SnapLayout.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test SnapLayout.sln --configuration Release --no-build --verbosity normal

    - name: Pack
      run: |
        Write-Host "Starting pack operation..."
        dotnet pack SnapLayout.Trigger/SnapLayout.Trigger.csproj --configuration Release --no-build --output ./artifacts --verbosity detailed
        Write-Host "Pack completed. Listing artifacts directory:"
        if (Test-Path ./artifacts) {
          Get-ChildItem ./artifacts -Recurse
        } else {
          Write-Error "Artifacts directory was not created!"
          exit 1
        }

    - name: Verify NuGet package
      run: |
        $nupkgFiles = Get-ChildItem ./artifacts/*.nupkg
        if ($nupkgFiles.Count -eq 0) {
          Write-Error "No .nupkg files found in ./artifacts directory"
          exit 1
        }
        Write-Host "Found $($nupkgFiles.Count) .nupkg file(s):"
        $nupkgFiles | ForEach-Object { Write-Host "  - $($_.Name)" }

    - name: Publish to NuGet
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    - name: Upload artifacts to release
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/*.nupkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
